---
apiVersion: v1
kind: Secret
metadata:
  name: store-file-secret
  namespace: my-ns
type: Opaque
data:
  keystore.p12: << cat filename | base64 -w 0 >>
  truststore.p12: << cat filename | base64 -w 0 >>

---
apiVersion: v1
kind: Secret
metadata:
  name: store-password-secret
  namespace: my-ns
type: Opaque
stringData:
  keystore-password: "changeit"
  truststore-password: "changeit"

---
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: tls-cert-ingress
  namespace: my-ns
  data:
    tls.crt: << cat filename | base64 -w 0 >>
    tls.key: << cat filename | base64 -w 0 >>
