---
services:
  jenkins:
    image: jenkins/jenkins:lts
    pull_policy: missing
    restart: unless-stopped
    hostname: "jenkins.svc.caspersbox.com"
    container_name: "jenkins"
    networks:
      service-network:
        ipv4_address: 192.168.1.22
    ports:
      - 8080:8080
      - 50000:50000
    volumes:
      - jenkins-data:/var/jenkins_home:rw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

---
volumes:
  jenkins-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "/opt/jenkins/data"

---
networks:
  service-network:
    external: true
