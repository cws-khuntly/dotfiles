---
services:
  portainer-agent:
    image: portainer/agent:2.33.7
    pull_policy: missing
    restart: unless-stopped
    hostname: "portainer-agent"
    container_name: "portainer-agent"
    network:
      service-network:
        ipv4_address: 192.168.1.252
    ports:
      - 9001:9001
    env_file:
      - path: ./.env
        required: true
    environment:
      EDGE: 1
      EDGE_ID: ${EDGE_IDENTIFIER}
      EDGE_INSECURE_POLL: 1
    volumes:
      - agent_data:/data:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/volumes:/var/lib/docker/volumes:ro

---
volumes:
  agent_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "/opt/portainer/data"

---
networks:
  service-network:
    external: true

